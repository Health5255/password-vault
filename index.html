<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码保险箱</title>
<style>
  /* ===== Reset & Variables ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, html.dark {
    --bg: #0a0a0f;
    --surface: #16161d;
    --surface-hover: #1e1e2a;
    --border: rgba(255,255,255,.06);
    --text: #f0f0f5;
    --text-secondary: rgba(255,255,255,.45);
    --accent: #7c5cfc;
    --accent2: #a855f7;
    --accent-glow: rgba(124,92,252,.3);
    --green: #30d158;
    --red: #ff453a;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-pill: 999px;
    --shadow: 0 8px 40px rgba(0,0,0,.55);
    --toggle-bg: rgba(255,255,255,.08);
    --input-bg: rgba(255,255,255,.05);
    --overlay-bg: rgba(0,0,0,.7);
    --blur-bg: rgba(22,22,29,.72);
    --card-border: rgba(255,255,255,.05);
  }
  html.light {
    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface-hover: #f2f2f7;
    --border: rgba(0,0,0,.08);
    --text: #1c1c1e;
    --text-secondary: rgba(0,0,0,.42);
    --accent: #7c5cfc;
    --accent2: #a855f7;
    --accent-glow: rgba(124,92,252,.22);
    --green: #34c759;
    --red: #ff3b30;
    --shadow: 0 8px 40px rgba(0,0,0,.1);
    --toggle-bg: rgba(0,0,0,.06);
    --input-bg: rgba(0,0,0,.03);
    --overlay-bg: rgba(0,0,0,.35);
    --blur-bg: rgba(255,255,255,.75);
    --card-border: rgba(0,0,0,.06);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background .4s cubic-bezier(.4,0,.2,1), color .4s cubic-bezier(.4,0,.2,1);
    cursor: default;
  }
  /* Subtle grain texture overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    opacity: .35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: overlay;
  }

  /* ===== Utility ===== */
  .hidden { display: none !important; }

  /* ===== App fade-in ===== */
  #app {
    animation: appIn .5s cubic-bezier(.22,1,.36,1) backwards;
  }
  @keyframes appIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* ===== Apple-style Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  /* ===== Login — Apple-inspired ===== */
  #loginScreen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    padding: 20px;
  }
  #loginScreen::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(124,92,252,.12) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(168,85,247,.08) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 10%, rgba(48,209,88,.04) 0%, transparent 40%);
    pointer-events: none;
  }
  .login-box {
    position: relative;
    background: var(--blur-bg);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 0.5px solid var(--border);
    border-radius: 28px;
    padding: 32px 28px 26px;
    width: 100%; max-width: 360px;
    box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 0 0.5px rgba(124,92,252,.08);
    animation: loginIn .55s cubic-bezier(.22,1,.36,1) backwards;
  }
  @keyframes loginIn {
    from { opacity: 0; transform: translateY(24px) scale(.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-box .logo-big { font-size: 44px; text-align: center; margin-bottom: 8px; display: block; filter: drop-shadow(0 2px 12px rgba(124,92,252,.15)); }
  .login-box h1 { font-size: 22px; text-align: center; font-weight: 700; margin-bottom: 2px; letter-spacing: -.3px; }
  .login-box h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .login-box .sub { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: 22px; font-weight: 400; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; letter-spacing: -0.1px; }
  .form-group input, .form-group select {
    width: 100%; padding: 12px 16px;
    background: var(--input-bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 15px;
    font-weight: 400;
    outline: none;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    caret-color: var(--accent);
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow), 0 0 0 0.5px var(--accent);
    background: var(--surface);
  }
  .form-group input::placeholder { color: var(--text-secondary); opacity: .4; }
  .btn-primary {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: var(--radius-pill);
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: all .25s cubic-bezier(.4,0,.2,1), transform .12s cubic-bezier(.4,0,.2,1);
    letter-spacing: -.1px;
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover { opacity: .9; box-shadow: 0 8px 24px var(--accent-glow); transform: scale(1.02); }
  .btn-primary:active { transform: scale(.97); opacity: .8; }
  .btn-primary::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.15) 100%);
    pointer-events: none;
  }
  .login-error { font-size: 13px; color: var(--red); margin-top: 10px; min-height: 20px; text-align: center; font-weight: 450; }
  .theme-btn-login {
    position: absolute; top: 12px; right: 12px;
    background: var(--toggle-bg); border: none; font-size: 16px; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: .6; transition: all .2s;
  }
  .theme-btn-login:hover { opacity: 1; background: var(--surface-hover); }

  /* Cloud auth toggle — Apple Segment Control with sliding indicator */
  .cloud-tabs {
    display: flex; gap: 2px; margin-bottom: 20px;
    background: var(--toggle-bg); border-radius: var(--radius-pill);
    padding: 2px;
    position: relative;
  }
  .cloud-tabs button {
    flex: 1; padding: 7px 0; border: none; background: transparent;
    color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer;
    border-radius: var(--radius-pill); transition: all .4s cubic-bezier(.34,1.56,.64,1);
    position: relative; z-index: 1;
  }
  .cloud-tabs button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.15); }

  /* ===== Header — Translucent ===== */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 0.5px solid var(--border);
    background: var(--blur-bg);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    gap: 12px;
    flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 26px; filter: drop-shadow(0 1px 6px rgba(124,92,252,.15)); }
  .logo h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
  .logo h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .header-stats { display: flex; gap: 10px; font-size: 12px; color: var(--text-secondary); font-weight: 450; }
  .header-stats strong { color: var(--text); font-weight: 600; }
  .theme-toggle {
    display: flex; align-items: center; gap: 6px;
    background: var(--toggle-bg); border: 0.5px solid var(--border); border-radius: var(--radius-pill);
    padding: 5px 14px; cursor: pointer; font-size: 14px;
    transition: all .2s; color: var(--text-secondary);
  }
  .theme-toggle:hover { background: var(--surface-hover); color: var(--text); }
  .btn-logout {
    background: var(--toggle-bg); border: 0.5px solid var(--border); border-radius: var(--radius-pill);
    padding: 5px 14px; font-size: 13px; color: var(--text-secondary); cursor: pointer;
    transition: all .2s; font-weight: 500;
  }
  .btn-logout:hover { background: rgba(255,69,58,.1); border-color: var(--red); color: var(--red); }

  /* ===== Toolbar ===== */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 180px; position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; color: var(--text-secondary); opacity: .4;
  }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 40px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-pill);
    color: var(--text); font-size: 13px;
    outline: none; transition: all .25s cubic-bezier(.4,0,.2,1);
  }
  .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: var(--surface); }
  .search-wrap input::placeholder { color: var(--text-secondary); opacity: .4; }
  .btn {
    padding: 8px 18px; border: none; border-radius: var(--radius-pill);
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all .2s cubic-bezier(.4,0,.2,1), transform .1s;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 12px var(--accent-glow); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 0.5px solid var(--border); }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.95); }

  /* ===== Vault Area ===== */
  .vault { flex: 1; padding: 4px 20px 30px; }

  /* ===== Grid ===== */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 12px; }
  .grid-empty {
    grid-column: 1 / -1;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 60px 20px 80px; color: var(--text-secondary);
  }
  .grid-empty svg { width: 48px; height: 48px; opacity: .18; }
  .grid-empty h3 { font-size: 17px; font-weight: 600; color: var(--text); }

  /* ===== Card ===== */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--card-border);
    border-radius: 18px;
    overflow: hidden;
    transition: all .3s cubic-bezier(.4,0,.2,1), transform .2s cubic-bezier(.34,1.56,.64,1);
    animation: cardIn .5s cubic-bezier(.22,1,.36,1) backwards;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: .05s; }
  .card:nth-child(3) { animation-delay: .1s; }
  .card:nth-child(4) { animation-delay: .14s; }
  .card:nth-child(5) { animation-delay: .18s; }
  .card:nth-child(6) { animation-delay: .21s; }
  .card:nth-child(n+7) { animation-delay: .24s; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(.94); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card:hover {
    border-color: rgba(124,92,252,.2);
    box-shadow: 0 8px 30px rgba(0,0,0,.12), 0 0 0 0.5px rgba(124,92,252,.1);
    transform: translateY(-3px);
  }
  .card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 16px 0;
  }
  .card-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-icon.purple { background: linear-gradient(135deg, rgba(124,92,252,.18), rgba(168,85,247,.08)); }
  .card-icon.blue { background: linear-gradient(135deg, rgba(54,153,255,.18), rgba(54,153,255,.08)); }
  .card-icon.green { background: linear-gradient(135deg, rgba(48,209,88,.18), rgba(48,209,88,.08)); }
  .card-icon.orange { background: linear-gradient(135deg, rgba(255,159,67,.18), rgba(255,159,67,.08)); }
  .card-icon.pink { background: linear-gradient(135deg, rgba(255,107,157,.18), rgba(255,107,157,.08)); }
  .card-icon.teal { background: linear-gradient(135deg, rgba(0,188,212,.18), rgba(0,188,212,.08)); }
  .card-icon.red { background: linear-gradient(135deg, rgba(255,69,58,.18), rgba(255,69,58,.08)); }
  .card-icon.yellow { background: linear-gradient(135deg, rgba(255,214,0,.18), rgba(255,214,0,.08)); }
  .card-info { flex: 1; min-width: 0; }
  .card-info .name { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
  .card-info .url { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-actions { display: flex; gap: 4px; }
  .btn-icon {
    background: none; border: none; font-size: 15px; cursor: pointer;
    padding: 4px 6px; border-radius: 8px; transition: all .2s;
    opacity: .4; display: flex; align-items: center; justify-content: center;
  }
  .btn-icon:hover { background: var(--surface-hover); opacity: .8; }
  .btn-icon.danger:hover { background: rgba(255,69,58,.12); opacity: 1; }
  .card-body { padding: 12px 16px 10px; }
  .field { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .field-label { color: var(--text-secondary); font-size: 12px; width: 36px; flex-shrink: 0; font-weight: 500; }
  .field-value { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 450; }
  .field-value.pw { cursor: pointer; font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace; letter-spacing: 2px; transition: letter-spacing .2s; }
  .field-value.pw.revealed { letter-spacing: 0; filter: none; }
  .field-action { flex-shrink: 0; }
  .card-footer { padding: 0 16px 12px; display: flex; gap: 4px; border-top: 0.5px solid var(--border); margin-top: 4px; padding-top: 8px; }
  .card-footer .btn-icon { font-size: 14px; opacity: .35; }
  .card-footer .btn-icon:hover { opacity: .7; }

  /* ===== Modal — Apple Sheet Style ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--overlay-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity .35s cubic-bezier(.4,0,.2,1);
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }
  .modal {
    background: var(--blur-bg);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 0.5px solid var(--border);
    border-radius: 24px; padding: 28px 24px 20px;
    width: 100%; max-width: 420px;
    box-shadow: 0 32px 80px rgba(0,0,0,.5);
    transform: translateY(20px) scale(.94);
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    opacity: 0;
  }
  .modal-overlay.active .modal { transform: translateY(0) scale(1); opacity: 1; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; letter-spacing: -.3px; }
  .pw-row { display: flex; gap: 8px; }
  .pw-row input { flex: 1; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions .btn { padding: 10px 24px; }
  .modal-actions .btn-primary { box-shadow: none; }
  .modal-actions .btn-ghost { font-weight: 500; }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 999; display: flex; flex-direction: column; gap: 8px;
    align-items: center; pointer-events: none;
  }
  .toast {
    padding: 12px 24px; border-radius: var(--radius-pill);
    font-size: 14px; font-weight: 500;
    background: var(--blur-bg);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 0.5px solid var(--border);
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
    animation: toastIn .4s cubic-bezier(.34,1.56,.64,1);
    pointer-events: auto;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(16px) scale(.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .toast.success { border-color: var(--green); box-shadow: 0 8px 32px rgba(48,209,88,.15); }
  .toast.error { border-color: var(--red); box-shadow: 0 8px 32px rgba(255,69,58,.15); }

  /* ===== Sync indicator ===== */
  .sync-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary);
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    background: var(--toggle-bg);
  }
  .sync-status .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-secondary);
    transition: background .3s;
  }
  .sync-status .dot.synced { background: var(--green); box-shadow: 0 0 6px rgba(48,209,88,.4); }
  .sync-status .dot.syncing { background: #ff9f0a; animation: pulse 1s infinite; }
  .sync-status .dot.error { background: var(--red); }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(.6); }
  }

  /* ===== Responsive ===== */
  @media (max-width: 500px) {
    .login-box { padding: 28px 22px 22px; max-width: 320px; }
    .login-box .logo-big { font-size: 36px; }
    .login-box h1 { font-size: 19px; }
    header { padding: 10px 14px; }
    .toolbar { padding: 10px 14px; }
    .vault { padding: 2px 14px 24px; }
    .grid { grid-template-columns: 1fr; gap: 10px; }
    .header-stats { display: none; }
    .toast-container { left: 16px; right: 16px; transform: none; }
  }
</style>
</head>
<body>

<!-- ===== Login ===== -->
<div id="loginScreen">
<div class="login-box">
  <button class="theme-btn-login" id="loginThemeBtn" onclick="toggleTheme()">🌙</button>
  <div class="logo-big">🔐</div>
  <h1>密码<span>保险箱</span></h1>
  <p class="sub" id="loginSubText">登录云账号以同步数据</p>

  <div class="cloud-tabs">
    <button class="active" id="tabLogin" onclick="switchCloudTab('login')">登录</button>
    <button id="tabRegister" onclick="switchCloudTab('register')">注册</button>
  </div>

  <div class="form-group">
    <label>邮箱</label>
    <input type="email" id="cloudEmail" placeholder="your@email.com" autocomplete="email" onkeydown="if(event.key==='Enter'&&this.value)document.getElementById('cloudPassword').focus()">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="cloudPassword" placeholder="至少8位" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleCloudAuth()">
  </div>
  <button class="btn-primary" id="cloudAuthBtn" onclick="handleCloudAuth()">登录</button>
  <div class="login-error" id="cloudError"></div>
</div>
</div>

<!-- ===== Main App ===== -->
<div id="app" style="display:none;flex-direction:column;min-height:100vh">
<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h1>密码<span>保险箱</span></h1>
  </div>
  <div class="header-actions">
    <div class="sync-status" id="syncStatus" title="同步状态">
      <span class="dot" id="syncDot"></span>
      <span id="syncText">未同步</span>
    </div>
    <div class="header-stats">
      <span>总计 <strong id="totalCount">0</strong> 条</span>
      <span>分类 <strong id="categoryCount">0</strong> 类</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色主题">
      <span class="knob">🌙</span>
    </button>
    <button class="btn-logout" onclick="logout()" title="锁定保险箱">🔒 锁定</button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toasts"></div>

<script>
// ===== Config =====
const API_BASE = window.location.origin;

// ===== Utility =====
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// AES-GCM encryption via Web Crypto API
async function deriveKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({
    name: 'PBKDF2',
    salt: enc.encode('pw-vault-salt-v2'),
    iterations: 100000,
    hash: 'SHA-256'
  }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
}

async function encryptData(data, password) {
  const key = await deriveKey(password);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encoded = new TextEncoder().encode(JSON.stringify(data));
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
  const combined = new Uint8Array(iv.length + new Uint8Array(encrypted).length);
  combined.set(iv);
  combined.set(new Uint8Array(encrypted), iv.length);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(encoded, password) {
  try {
    const raw = Uint8Array.from(atob(encoded), c => c.charCodeAt(0));
    const iv = raw.slice(0, 12);
    const data = raw.slice(12);
    const key = await deriveKey(password);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    return JSON.parse(new TextDecoder().decode(decrypted));
  } catch { return null; }
}

// ===== Theme =====
function getTheme() {
  return localStorage.getItem('pw_theme') || 'dark';
}

function setTheme(theme) {
  localStorage.setItem('pw_theme', theme);
  document.documentElement.className = theme;
  const isDark = theme === 'dark';
  document.querySelectorAll('.theme-toggle .knob, #loginThemeBtn').forEach(el => {
    el.textContent = isDark ? '🌙' : '☀️';
  });
}

function toggleTheme() {
  const next = getTheme() === 'dark' ? 'light' : 'dark';
  setTheme(next);
}

// ===== Cloud Auth =====
let cloudTab = 'login';
let cloudToken = localStorage.getItem('pw_cloud_token') || '';
let cloudEmail = localStorage.getItem('pw_cloud_email') || '';
let serverVersion = 0;
let masterKey = '';

function switchCloudTab(tab) {
  cloudTab = tab;
  document.getElementById('tabLogin').className = tab === 'login' ? 'active' : '';
  document.getElementById('tabRegister').className = tab === 'register' ? 'active' : '';
  document.getElementById('cloudAuthBtn').textContent = tab === 'login' ? '登录' : '注册';
  document.getElementById('loginSubText').textContent = tab === 'login' ? '登录云账号以同步数据' : '注册云账号以同步数据';
  document.getElementById('cloudError').textContent = '';
}

async function handleCloudAuth() {
  const email = document.getElementById('cloudEmail').value.trim();
  const password = document.getElementById('cloudPassword').value;
  const error = document.getElementById('cloudError');
  error.textContent = '';

  if (!email) { error.textContent = '请输入邮箱'; return; }
  if (!password) { error.textContent = '请输入密码'; return; }
  if (password.length < 8) { error.textContent = '密码至少8位'; return; }
  if (password.length > 128) { error.textContent = '密码太长了'; return; }

  const btn = document.getElementById('cloudAuthBtn');
  btn.textContent = '处理中...';
  btn.disabled = true;

  try {
    const endpoint = cloudTab === 'login' ? '/api/auth/login' : '/api/auth/register';
    const res = await fetch(API_BASE + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) {
      error.textContent = data.error || '操作失败';
      btn.textContent = cloudTab === 'login' ? '登录' : '注册';
      btn.disabled = false;
      return;
    }

    cloudToken = data.token;
    cloudEmail = data.email;
    localStorage.setItem('pw_cloud_token', cloudToken);
    localStorage.setItem('pw_cloud_email', cloudEmail);

    // Use cloud password as encryption key - no separate master password needed
    masterKey = password;
    sessionStorage.setItem('pw_logged_in', 'true');

    toast(cloudTab === 'login' ? '✅ 云账号登录成功' : '✅ 云账号注册成功', 'success');

    // Enter the app
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    await init();
  } catch (e) {
    error.textContent = '网络错误，请检查服务器是否启动';
  }

  btn.textContent = cloudTab === 'login' ? '登录' : '注册';
  btn.disabled = false;
}

// ===== Cloud Sync =====
function setSyncState(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'dot ' + state;
  txt.textContent = text || '';
}

async function syncFetch() {
  if (!cloudToken) return null;
  setSyncState('syncing', '同步中...');
  try {
    const res = await fetch(API_BASE + '/api/vault', {
      headers: { 'Authorization': 'Bearer ' + cloudToken }
    });
    if (!res.ok) {
      if (res.status === 401) {
        cloudToken = '';
        localStorage.removeItem('pw_cloud_token');
        setSyncState('error', '登录已过期');
        return null;
      }
      setSyncState('error', '同步失败');
      return null;
    }
    const data = await res.json();
    serverVersion = data.version;
    setSyncState('synced', data.encrypted ? '已同步' : '云端为空');
    return data;
  } catch {
    setSyncState('error', '无法连接');
    return null;
  }
}

async function syncPush(encrypted) {
  if (!cloudToken) return false;
  setSyncState('syncing', '保存中...');
  try {
    const res = await fetch(API_BASE + '/api/vault', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + cloudToken
      },
      body: JSON.stringify({ encrypted, clientVersion: serverVersion })
    });
    if (!res.ok) {
      if (res.status === 409) {
        const err = await res.json();
        toast('⚠️ 数据冲突：服务器数据已更新，正在重新获取...', 'error');
        const sv = await syncFetch();
        if (sv && sv.encrypted && masterKey) {
          const decrypted = await decryptData(sv.encrypted, masterKey);
          if (decrypted) {
            data = decrypted;
            render();
            toast('已合并服务器数据，请重新编辑', 'success');
          }
        }
        setSyncState('error', '冲突');
        return false;
      }
      if (res.status === 401) {
        cloudToken = '';
        localStorage.removeItem('pw_cloud_token');
        setSyncState('error', '登录已过期');
        return false;
      }
      setSyncState('error', '保存失败');
      return false;
    }
    const result = await res.json();
    serverVersion = result.version;
    setSyncState('synced', '已同步');
    return true;
  } catch {
    setSyncState('error', '无法连接');
    return false;
  }
}

// ===== Auth state =====
function logout() {
  masterKey = '';
  sessionStorage.removeItem('pw_logged_in');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('cloudEmail').value = cloudEmail || '';
  document.getElementById('cloudPassword').value = '';
  document.getElementById('cloudError').textContent = '';
  setSyncState('', '未同步');
}

// ===== Data =====
let data = [];
let editingId = null;

const samples = [
  { name:'GitHub', url:'https://github.com', icon:'👾', color:'purple', username:'zhangsan.dev', password:'G!thUb_2024#p@ss', note:'个人主账号' },
  { name:'Google', url:'https://google.com', icon:'🌐', color:'blue', username:'zhangsan@gmail.com', password:'G00gl3!Pass_2024', note:'Gmail' },
  { name:'微信公众平台', url:'https://mp.weixin.qq.com', icon:'💬', color:'green', username:'zhangsan@qq.com', password:'WxMp#2024@dev', note:'小程序管理' },
  { name:'阿里云', url:'https://aliyun.com', icon:'☁️', color:'orange', username:'aliyun_zs', password:'AliYun!Cs2024', note:'ECS + OSS' },
  { name:'掘金', url:'https://juejin.cn', icon:'📘', color:'pink', username:'zhangsan_dev', password:'JueJ!n_888', note:'技术博客' },
  { name:'腾讯云', url:'https://cloud.tencent.com', icon:'🐧', color:'teal', username:'tencent_zs', password:'TxcLoud#2024', note:'CDN + 域名' },
  { name:'Docker Hub', url:'https://hub.docker.com', icon:'🐳', color:'blue', username:'zhangsan', password:'D0ck3rHub!@#', note:'镜像仓库' },
  { name:'Notion', url:'https://notion.so', icon:'📝', color:'yellow', username:'zhangsan@outlook.com', password:'N0t!0n_2024$ec', note:'工作文档' },
];

// ===== Init =====
async function init() {
  // First try to fetch from cloud
  if (cloudToken) {
    const sv = await syncFetch();
    if (sv && sv.encrypted && masterKey) {
      const decrypted = await decryptData(sv.encrypted, masterKey);
      if (decrypted) {
        data = decrypted;
        saveLocal();
        render();
        return;
      }
    }
  }

  // Fallback to local
  const saved = localStorage.getItem('pw_vault_enc');
  if (saved && masterKey) {
    const decrypted = await decryptData(saved, masterKey);
    if (decrypted) { data = decrypted; }
  }
  if (data.length === 0) {
    data = samples.map(e => ({ ...e, id: crypto.randomUUID() }));
    await save();
  }
  render();
}

async function saveLocal() {
  if (masterKey) {
    const encrypted = await encryptData(data, masterKey);
    localStorage.setItem('pw_vault_enc', encrypted);
  }
}

async function save() {
  await saveLocal();
  if (cloudToken && masterKey) {
    const encrypted = await encryptData(data, masterKey);
    await syncPush(encrypted);
  }
}

// ===== Render =====
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = data;
  if (q) {
    filtered = data.filter(e =>
      e.name.toLowerCase().includes(q) ||
      e.username.toLowerCase().includes(q) ||
      (e.note && e.note.toLowerCase().includes(q))
    );
  }

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="grid-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M10 12l2 2 4-4"/></svg>
      <h3>${q ? '没有匹配的结果' : '密码库还是空的'}</h3>
      <p style="color:var(--text-secondary);font-size:.85rem">${q ? '换个关键词试试' : '点击上方「新增」按钮添加第一条密码'}</p>
    </div>`;
  } else {
    grid.innerHTML = filtered.map((e, i) => renderCard(e, i)).join('');
  }

  const cats = new Set(data.map(e => e.color));
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('categoryCount').textContent = cats.size;
}

function renderCard(e, i) {
  const passwordMasked = '•'.repeat(Math.min(e.password.length, 16));
  const delay = Math.min(i * 30, 200);
  return `<div class="card" data-color="${e.color}" data-id="${e.id}" style="animation-delay:${delay}ms">
    <div class="card-header">
      <div class="card-icon ${e.color}">${e.icon || '🔑'}</div>
      <div class="card-info">
        <div class="name">${esc(e.name)}</div>
        <div class="url">${esc(e.url) || '—'}</div>
      </div>
      <div class="card-actions">
        <button class="btn-icon" onclick="editEntry('${e.id}')" title="编辑">✏️</button>
        <button class="btn-icon danger" onclick="deleteEntry('${e.id}')" title="删除">🗑️</button>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <span class="field-label">用户</span>
        <span class="field-value">${esc(e.username)}</span>
        <span class="field-action">
          <button class="btn-icon" onclick="copyText('${esc(e.username)}')" title="复制用户名">📋</button>
        </span>
      </div>
      <div class="field">
        <span class="field-label">密码</span>
        <span class="field-value pw" id="pw-${e.id}" onclick="togglePw('${e.id}')" title="点击切换显示/隐藏">${passwordMasked}</span>
        <span class="field-action">
          <button class="btn-icon" onclick="copyPw('${e.id}')" title="复制密码">📋</button>
        </span>
      </div>
      ${e.note ? `<div class="field">
        <span class="field-label">备注</span>
        <span class="field-value">${esc(e.note)}</span>
      </div>` : ''}
    </div>
    <div class="card-footer">
      <button class="btn-icon" onclick="window.open('${esc(e.url)}','_blank')" title="打开网址">🔗</button>
    </div>
  </div>`;
}

// ===== Password Toggle =====
function togglePw(id) {
  const el = document.getElementById('pw-' + id);
  const entry = data.find(e => e.id === id);
  if (!entry) return;
  if (el.classList.toggle('revealed')) {
    el.textContent = entry.password;
  } else {
    el.textContent = '•'.repeat(Math.min(entry.password.length, 16));
  }
}

// ===== Copy with auto-clear (30s) =====
let clipboardTimer = null;

function clearClipboard() {
  navigator.clipboard.writeText('').catch(() => {});
  if (clipboardTimer) {
    clearTimeout(clipboardTimer);
    clipboardTimer = null;
  }
}

function copyText(t) {
  navigator.clipboard.writeText(t).then(() => {
    if (clipboardTimer) clearTimeout(clipboardTimer);
    clipboardTimer = setTimeout(clearClipboard, 30000);
    toast('已复制到剪贴板（30秒后自动清除）', 'success');
  });
}

function copyPw(id) {
  const entry = data.find(e => e.id === id);
  if (!entry) return;
  navigator.clipboard.writeText(entry.password).then(() => {
    if (clipboardTimer) clearTimeout(clipboardTimer);
    clipboardTimer = setTimeout(clearClipboard, 30000);
    toast('密码已复制（30秒后自动清除）', 'success');
  });
}

// ===== Inactivity Auto-Lock (5 minutes) =====
let inactivityTimer = null;
const INACTIVITY_TIMEOUT = 5 * 60 * 1000;

function resetInactivityTimer() {
  if (inactivityTimer) {
    clearTimeout(inactivityTimer);
  }
  if (masterKey) {
    inactivityTimer = setTimeout(() => {
      if (masterKey) {
        toast('⏰ 因长时间未操作，保险箱已自动锁定', 'warning');
        logout();
      }
    }, INACTIVITY_TIMEOUT);
  }
}

document.addEventListener('click', resetInactivityTimer);
document.addEventListener('keydown', resetInactivityTimer);
document.addEventListener('mousemove', resetInactivityTimer);
document.addEventListener('scroll', resetInactivityTimer);

// ===== Modal =====
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '📝 新增密码';
  document.getElementById('modalSaveBtn').textContent = '保存';
  document.getElementById('fName').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fIcon').value = '';
  document.getElementById('fColor').value = 'purple';
  document.getElementById('fUsername').value = '';
  document.getElementById('fPassword').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('modal').classList.add('active');
  document.getElementById('fName').focus();
}

function editEntry(id) {
  const e = data.find(d => d.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ 编辑密码';
  document.getElementById('modalSaveBtn').textContent = '更新';
  document.getElementById('fName').value = e.name;
  document.getElementById('fUrl').value = e.url || '';
  document.getElementById('fIcon').value = e.icon || '';
  document.getElementById('fColor').value = e.color || 'purple';
  document.getElementById('fUsername').value = e.username;
  document.getElementById('fPassword').value = e.password;
  document.getElementById('fNote').value = e.note || '';
  document.getElementById('modal').classList.add('active');
  document.getElementById('fName').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function saveEntry() {
  const name = document.getElementById('fName').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const icon = document.getElementById('fIcon').value.trim();
  const color = document.getElementById('fColor').value;
  const username = document.getElementById('fUsername').value.trim();
  const password = document.getElementById('fPassword').value;
  const note = document.getElementById('fNote').value.trim();

  if (!name) { toast('请输入服务名称', 'error'); return; }
  if (!username) { toast('请输入用户名', 'error'); return; }
  if (!password) { toast('请输入密码', 'error'); return; }

  const obj = { id: editingId || crypto.randomUUID(), name, url, icon, color, username, password, note };

  if (editingId) {
    const idx = data.findIndex(d => d.id === editingId);
    if (idx !== -1) data[idx] = obj;
  } else {
    data.push(obj);
  }

  save().then(() => {
    closeModal();
    render();
    toast(editingId ? '✅ 已更新' : '✅ 已新增', 'success');
  });
}

function deleteEntry(id) {
  if (!confirm('确定要删除这条密码吗？')) return;
  data = data.filter(e => e.id !== id);
  save().then(() => {
    render();
    toast('🗑️ 已删除', 'success');
  });
}

function generatePassword() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
  let pw = '';
  for (let i = 0; i < 16; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  document.getElementById('fPassword').value = pw;
}

// ===== Toast =====
function toast(msg, type) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = msg;
  c.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all .3s';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

// ===== Keyboard =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal').classList.contains('active')) closeModal();
  }
});

// ===== Boot =====
(async function boot() {
  setTheme(getTheme());

  // Restore cloud token if exists
  if (cloudToken && cloudEmail) {
    document.getElementById('cloudEmail').value = cloudEmail;
  }
})();
</script>
</body>
