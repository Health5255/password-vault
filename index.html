<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码保险箱</title>
<style>
  /* ===== Reset & Variables ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface-hover: #24243a;
    --border: #2a2a3e;
    --text: #e4e4f0;
    --text-secondary: #8888aa;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,.25);
    --green: #00d68f;
    --red: #ff6b6b;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,.45);
  }
  html { font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(108,92,231,.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,214,143,.06) 0%, transparent 50%);
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  /* ===== Header ===== */
  header {
    padding: 24px 32px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .logo h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.3px; }
  .logo h1 span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: .85rem;
    color: var(--text-secondary);
  }
  .header-stats strong { color: var(--text); font-weight: 600; }

  /* ===== Search Bar ===== */
  .toolbar {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-secondary);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 42px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: .9rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-wrap input::placeholder { color: var(--text-secondary); }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .btn {
    padding: 10px 20px;
    border: none; border-radius: var(--radius-sm);
    font-size: .9rem; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #7c6cf0);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
  .btn-icon {
    width: 34px; height: 34px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .18s;
  }
  .btn-icon:hover { background: var(--surface-hover); color: var(--text); }
  .btn-icon.danger:hover { color: var(--red); background: rgba(255,107,107,.1); }
  .btn-sm { padding: 6px 14px; font-size: .8rem; }

  /* ===== Vault Grid ===== */
  .vault {
    padding: 0 32px 32px;
    flex: 1;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .grid-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .grid-empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: .3; }
  .grid-empty h3 { color: var(--text); margin-bottom: 6px; }

  /* ===== Card ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card[data-color="purple"]::before { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
  .card[data-color="blue"]::before   { background: linear-gradient(90deg, #3498db, #74b9ff); }
  .card[data-color="green"]::before  { background: linear-gradient(90deg, #00b894, #55efc4); }
  .card[data-color="orange"]::before { background: linear-gradient(90deg, #e17055, #fdcb6e); }
  .card[data-color="pink"]::before   { background: linear-gradient(90deg, #e84393, #fd79a8); }
  .card[data-color="teal"]::before   { background: linear-gradient(90deg, #00cec9, #81ecec); }
  .card[data-color="red"]::before    { background: linear-gradient(90deg, #d63031, #ff7675); }
  .card[data-color="yellow"]::before { background: linear-gradient(90deg, #f39c12, #ffeaa7); }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 24px rgba(0,0,0,.3);
    transform: translateY(-2px);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .card-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card-icon.purple  { background: rgba(108,92,231,.15); }
  .card-icon.blue    { background: rgba(52,152,219,.15); }
  .card-icon.green   { background: rgba(0,184,148,.15); }
  .card-icon.orange  { background: rgba(225,112,85,.15); }
  .card-icon.pink    { background: rgba(232,67,147,.15); }
  .card-icon.teal    { background: rgba(0,206,201,.15); }
  .card-icon.red     { background: rgba(214,48,49,.15); }
  .card-icon.yellow  { background: rgba(243,156,18,.15); }

  .card-info { flex: 1; min-width: 0; }
  .card-info .name {
    font-weight: 600; font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-info .url {
    font-size: .75rem; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .card-body { margin-bottom: 10px; }
  .field {
    display: flex; align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .field:last-child { border-bottom: none; }
  .field-label {
    width: 52px; font-size: .75rem; color: var(--text-secondary);
    flex-shrink: 0;
  }
  .field-value {
    flex: 1; min-width: 0;
    font-size: .85rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  .field-value.pw { letter-spacing: 1.5px; cursor: pointer; }
  .field-value.pw.revealed { letter-spacing: 0; }
  .field-action {
    flex-shrink: 0;
    margin-left: 8px;
  }
  .field-action .btn-icon { width: 26px; height: 26px; }

  .card-footer {
    display: flex; justify-content: flex-end; gap: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,.04);
  }
  .card-footer .btn-icon { width: 28px; height: 28px; font-size: .8rem; }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%; max-width: 480px;
    padding: 28px 32px;
    box-shadow: var(--shadow);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: none; } }
  .modal h2 {
    font-size: 1.15rem; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: .8rem; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 5px;
  }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    color: var(--text);
    font-size: .9rem;
    outline: none;
    transition: border .2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-group .pw-row {
    display: flex; gap: 8px;
  }
  .form-group .pw-row input { flex: 1; }
  .form-group .pw-row .btn-icon { align-self: stretch; width: 40px; }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 200;
  }
  .toast {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    font-size: .85rem;
    display: flex; align-items: center; gap: 10px;
    animation: toastIn .25s ease;
  }
  .toast.success { border-color: var(--green); }
  .toast.success svg { color: var(--green); }
  .toast.error { border-color: var(--red); }
  .toast.error svg { color: var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    header { padding: 16px 16px 0; }
    .toolbar { padding: 12px 16px; }
    .vault { padding: 0 16px 20px; }
    .grid { grid-template-columns: 1fr; }
    .modal { padding: 20px; }
    .header-stats { order: 3; width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h1>密码<span>保险箱</span></h1>
  </div>
  <div class="header-stats">
    <span>总计 <strong id="totalCount">0</strong> 条</span>
    <span>分类 <strong id="categoryCount">0</strong> 类</span>
  </div>
</header>

<!-- ===== Toolbar ===== -->
<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="搜索服务名称或用户名…" oninput="render()">
  </div>
  <button class="btn btn-primary" onclick="openAddModal()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    新增
  </button>
</div>

<!-- ===== Vault ===== -->
<div class="vault">
  <div class="grid" id="grid"></div>
</div>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">📝 新增密码</h2>
    <div class="form-group">
      <label>服务名称</label>
      <input type="text" id="fName" placeholder="例如: GitHub">
    </div>
    <div class="form-group">
      <label>网址（可选）</label>
      <input type="text" id="fUrl" placeholder="例如: https://github.com">
    </div>
    <div class="form-group">
      <label>图标 emoji</label>
      <input type="text" id="fIcon" placeholder="例如: 👾" maxlength="2" style="width:80px">
    </div>
    <div class="form-group">
      <label>分类色标</label>
      <select id="fColor">
        <option value="purple">紫色</option>
        <option value="blue">蓝色</option>
        <option value="green">绿色</option>
        <option value="orange">橙色</option>
        <option value="pink">粉色</option>
        <option value="teal">青色</option>
        <option value="red">红色</option>
        <option value="yellow">黄色</option>
      </select>
    </div>
    <div class="form-group">
      <label>用户名 / 邮箱</label>
      <input type="text" id="fUsername" placeholder="例如: user@example.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="pw-row">
        <input type="text" id="fPassword" placeholder="输入密码">
        <button class="btn-icon" onclick="generatePassword()" title="生成随机密码">🎲</button>
      </div>
    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <input type="text" id="fNote" placeholder="例如: 个人邮箱">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalSaveBtn" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<!-- ===== Toast Container ===== -->
<div class="toast-container" id="toasts"></div>

<script>
// ===== Data =====
let data = [];
let editingId = null;

// ===== Sample Data =====
const samples = [
  { name:'GitHub', url:'https://github.com', icon:'👾', color:'purple', username:'zhangsan.dev', password:'G!thUb_2024#p@ss', note:'个人主账号' },
  { name:'Google', url:'https://google.com', icon:'🌐', color:'blue', username:'zhangsan@gmail.com', password:'G00gl3!Pass_2024', note:'Gmail' },
  { name:'微信公众平台', url:'https://mp.weixin.qq.com', icon:'💬', color:'green', username:'zhangsan@qq.com', password:'WxMp#2024@dev', note:'小程序管理' },
  { name:'阿里云', url:'https://aliyun.com', icon:'☁️', color:'orange', username:'aliyun_zs', password:'AliYun!Cs2024', note:'ECS + OSS' },
  { name:'掘金', url:'https://juejin.cn', icon:'📘', color:'pink', username:'zhangsan_dev', password:'JueJ!n_888', note:'技术博客' },
  { name:'腾讯云', url:'https://cloud.tencent.com', icon:'🐧', color:'teal', username:'tencent_zs', password:'TxcLoud#2024', note:'CDN + 域名' },
  { name:'Docker Hub', url:'https://hub.docker.com', icon:'🐳', color:'blue', username:'zhangsan', password:'D0ck3rHub!@#', note:'镜像仓库' },
  { name:'Notion', url:'https://notion.so', icon:'📝', color:'yellow', username:'zhangsan@outlook.com', password:'N0t!0n_2024$ec', note:'工作文档' },
];

// ===== Init =====
function init() {
  const saved = localStorage.getItem('pw_vault_data');
  if (saved) {
    try { data = JSON.parse(saved); } catch { data = []; }
  }
  if (data.length === 0) {
    data = samples.map(e => ({ ...e, id: crypto.randomUUID() }));
    save();
  }
  render();
}

function save() {
  localStorage.setItem('pw_vault_data', JSON.stringify(data));
}

// ===== Render =====
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = data;
  if (q) {
    filtered = data.filter(e =>
      e.name.toLowerCase().includes(q) ||
      e.username.toLowerCase().includes(q) ||
      (e.note && e.note.toLowerCase().includes(q))
    );
  }

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="grid-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M10 12l2 2 4-4"/></svg>
      <h3>${q ? '没有匹配的结果' : '密码库还是空的'}</h3>
      <p style="color:var(--text-secondary);font-size:.85rem">${q ? '换个关键词试试' : '点击上方「新增」按钮添加第一条密码'}</p>
    </div>`;
  } else {
    grid.innerHTML = filtered.map(e => renderCard(e)).join('');
  }

  // Update stats
  const cats = new Set(data.map(e => e.color));
  document.getElementById('totalCount').textContent = data.length;
  document.getElementById('categoryCount').textContent = cats.size;
}

function renderCard(e) {
  const passwordMasked = '•'.repeat(Math.min(e.password.length, 16));
  return `<div class="card" data-color="${e.color}" data-id="${e.id}">
    <div class="card-header">
      <div class="card-icon ${e.color}">${e.icon || '🔑'}</div>
      <div class="card-info">
        <div class="name">${esc(e.name)}</div>
        <div class="url">${esc(e.url) || '—'}</div>
      </div>
      <div class="card-actions">
        <button class="btn-icon" onclick="editEntry('${e.id}')" title="编辑">✏️</button>
        <button class="btn-icon danger" onclick="deleteEntry('${e.id}')" title="删除">🗑️</button>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <span class="field-label">用户</span>
        <span class="field-value">${esc(e.username)}</span>
        <span class="field-action">
          <button class="btn-icon" onclick="copyText('${esc(e.username)}')" title="复制用户名">📋</button>
        </span>
      </div>
      <div class="field">
        <span class="field-label">密码</span>
        <span class="field-value pw" id="pw-${e.id}" onclick="togglePw('${e.id}')" title="点击切换显示/隐藏">${passwordMasked}</span>
        <span class="field-action">
          <button class="btn-icon" onclick="copyPw('${e.id}')" title="复制密码">📋</button>
        </span>
      </div>
      ${e.note ? `<div class="field">
        <span class="field-label">备注</span>
        <span class="field-value">${esc(e.note)}</span>
      </div>` : ''}
    </div>
    <div class="card-footer">
      <button class="btn-icon" onclick="window.open('${esc(e.url)}','_blank')" title="打开网址">🔗</button>
    </div>
  </div>`;
}

// ===== Password Toggle =====
function togglePw(id) {
  const el = document.getElementById('pw-' + id);
  const entry = data.find(e => e.id === id);
  if (!entry) return;
  if (el.classList.toggle('revealed')) {
    el.textContent = entry.password;
  } else {
    el.textContent = '•'.repeat(Math.min(entry.password.length, 16));
  }
}

// ===== Copy =====
function copyText(t) {
  navigator.clipboard.writeText(t).then(() => toast('已复制到剪贴板', 'success'));
}
function copyPw(id) {
  const entry = data.find(e => e.id === id);
  if (!entry) return;
  navigator.clipboard.writeText(entry.password).then(() => toast('密码已复制', 'success'));
}

// ===== Modal =====
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '📝 新增密码';
  document.getElementById('modalSaveBtn').textContent = '保存';
  document.getElementById('fName').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fIcon').value = '';
  document.getElementById('fColor').value = 'purple';
  document.getElementById('fUsername').value = '';
  document.getElementById('fPassword').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('modal').classList.add('active');
  document.getElementById('fName').focus();
}

function editEntry(id) {
  const e = data.find(d => d.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ 编辑密码';
  document.getElementById('modalSaveBtn').textContent = '更新';
  document.getElementById('fName').value = e.name;
  document.getElementById('fUrl').value = e.url || '';
  document.getElementById('fIcon').value = e.icon || '';
  document.getElementById('fColor').value = e.color || 'purple';
  document.getElementById('fUsername').value = e.username;
  document.getElementById('fPassword').value = e.password;
  document.getElementById('fNote').value = e.note || '';
  document.getElementById('modal').classList.add('active');
  document.getElementById('fName').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function saveEntry() {
  const name = document.getElementById('fName').value.trim();
  const url = document.getElementById('fUrl').value.trim();
  const icon = document.getElementById('fIcon').value.trim();
  const color = document.getElementById('fColor').value;
  const username = document.getElementById('fUsername').value.trim();
  const password = document.getElementById('fPassword').value;
  const note = document.getElementById('fNote').value.trim();

  if (!name) { toast('请输入服务名称', 'error'); return; }
  if (!username) { toast('请输入用户名', 'error'); return; }
  if (!password) { toast('请输入密码', 'error'); return; }

  const entry = { name, url, icon: icon || '🔑', color, username, password, note };

  if (editingId) {
    const idx = data.findIndex(d => d.id === editingId);
    if (idx !== -1) { data[idx] = { ...data[idx], ...entry }; }
    toast('已更新「' + name + '」', 'success');
  } else {
    entry.id = crypto.randomUUID();
    data.push(entry);
    toast('已添加「' + name + '」', 'success');
  }
  save();
  render();
  closeModal();
}

function deleteEntry(id) {
  const entry = data.find(e => e.id === id);
  if (!entry) return;
  if (!confirm(`确定删除「${entry.name}」的密码记录吗？`)) return;
  data = data.filter(e => e.id !== id);
  save();
  render();
  toast('已删除「' + entry.name + '」', 'success');
}

// ===== Generate Password =====
function generatePassword() {
  const low = 'abcdefghijklmnopqrstuvwxyz';
  const up = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const num = '0123456789';
  const sym = '!@#$%^&*_+-=';
  const all = low + up + num + sym;
  let pw = '';
  pw += low[Math.floor(Math.random()*low.length)];
  pw += up[Math.floor(Math.random()*up.length)];
  pw += num[Math.floor(Math.random()*num.length)];
  pw += sym[Math.floor(Math.random()*sym.length)];
  for (let i = 0; i < 8; i++) pw += all[Math.floor(Math.random()*all.length)];
  pw = pw.split('').sort(()=>Math.random()-.5).join('');
  document.getElementById('fPassword').value = pw;
}

// ===== Toast =====
function toast(msg, type) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = (type === 'success'
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>')
    + msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2200);
}

// ===== Utility =====
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== Keyboard =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modal').classList.contains('active')) closeModal();
});

// ===== Start =====
init();
</script>
