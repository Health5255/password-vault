<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瀵嗙爜淇濋櫓绠?/title>
<style>
  /* ===== Reset & Variables ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Dark Theme (default) */
  :root, html.dark {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --surface-hover: #24243a;
    --border: #2a2a3e;
    --text: #e4e4f0;
    --text-secondary: #8888aa;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,.25);
    --green: #00d68f;
    --red: #ff6b6b;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,.45);
    --toggle-bg: #2a2a3e;
    --input-bg: var(--bg);
    --card-border: var(--border);
    --overlay-bg: rgba(0,0,0,.6);
    --divider: rgba(255,255,255,.04);
  }

  /* Light Theme */
  html.light {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --surface-hover: #e8eaf0;
    --border: #d4d6e0;
    --text: #1a1a2e;
    --text-secondary: #6b6b8a;
    --accent: #6c5ce7;
    --accent-glow: rgba(108,92,231,.18);
    --green: #00b87a;
    --red: #e74c3c;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,.1);
    --toggle-bg: #d4d6e0;
    --input-bg: #f0f2f8;
    --card-border: #d4d6e0;
    --overlay-bg: rgba(0,0,0,.35);
    --divider: rgba(0,0,0,.06);
  }

  html { font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background .3s, color .3s;
  }
  html.dark body {
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(108,92,231,.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,214,143,.06) 0%, transparent 50%);
  }
  html.light body {
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(108,92,231,.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,214,143,.03) 0%, transparent 50%);
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

  /* ===== Login Screen ===== */
  #loginScreen {
    position: fixed; inset: 0;
    z-index: 999;
    display: flex;
    align-items: center; justify-content: center;
    background: var(--bg);
    backdrop-filter: blur(0);
    transition: background .3s;
  }
  #loginScreen.hidden {
    display: none;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px 36px;
    width: 100%; max-width: 400px;
    box-shadow: var(--shadow);
    text-align: center;
    animation: modalIn .35s ease;
  }
  .login-box .logo-big {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .login-box h1 {
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .login-box h1 span { color: var(--accent); }
  .login-box p.sub {
    font-size: .85rem;
    color: var(--text-secondary);
    margin-bottom: 28px;
  }
  .login-box .form-group {
    text-align: left;
    margin-bottom: 20px;
  }
  .login-box .form-group label {
    display: block;
    font-size: .8rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .login-box .form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--input-bg);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .login-box .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .login-box .btn-primary {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--accent), #7c6cf0);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .login-box .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px var(--accent-glow);
  }
  .login-box .btn-primary:active { transform: translateY(0); }
  .login-box .login-error {
    color: var(--red);
    font-size: .8rem;
    margin-top: 12px;
    min-height: 20px;
  }
  .login-box .setup-hint {
    font-size: .78rem;
    color: var(--text-secondary);
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border);
    line-height: 1.5;
  }
  .login-box .theme-btn-login {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: var(--text-secondary);
    transition: all .2s;
  }
  .login-box .theme-btn-login:hover {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* ===== Header ===== */
  header {
    padding: 24px 32px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    transition: background .3s;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #a29bfe);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .logo h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.3px; }
  .logo h1 span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: .85rem;
    color: var(--text-secondary);
  }
  .header-stats strong { color: var(--text); font-weight: 600; }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ===== Theme Toggle ===== */
  .theme-toggle {
    background: var(--toggle-bg);
    border: none;
    border-radius: 20px;
    width: 48px;
    height: 26px;
    display: flex;
    align-items: center;
    padding: 3px;
    cursor: pointer;
    position: relative;
    transition: background .3s;
    flex-shrink: 0;
  }
  .theme-toggle .knob {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--surface);
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
    transition: transform .3s, background .3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  html.dark .theme-toggle .knob { transform: translateX(0); }
  html.light .theme-toggle .knob { transform: translateX(22px); }

  /* ===== Logout Button ===== */
  .btn-logout {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-secondary);
    font-size: .8rem;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-logout:hover {
    background: var(--surface-hover);
    color: var(--red);
    border-color: var(--red);
  }

  /* ===== Search Bar ===== */
  .toolbar {
    padding: 20px 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px; color: var(--text-secondary);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 42px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: .9rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  .search-wrap input::placeholder { color: var(--text-secondary); }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .btn {
    padding: 10px 20px;
    border: none; border-radius: var(--radius-sm);
    font-size: .9rem; font-weight: 600;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #7c6cf0);
    color: #fff;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }
  .btn-icon {
    width: 34px; height: 34px; padding: 0;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .18s;
  }
  .btn-icon:hover { background: var(--surface-hover); color: var(--text); }
  .btn-icon.danger:hover { color: var(--red); background: rgba(255,107,107,.1); }
  .btn-sm { padding: 6px 14px; font-size: .8rem; }

  /* ===== Vault Grid ===== */
  .vault {
    padding: 0 32px 32px;
    flex: 1;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .grid-empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .grid-empty svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: .3; }
  .grid-empty h3 { color: var(--text); margin-bottom: 6px; }

  /* ===== Card ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card[data-color="purple"]::before { background: linear-gradient(90deg, #6c5ce7, #a29bfe); }
  .card[data-color="blue"]::before   { background: linear-gradient(90deg, #3498db, #74b9ff); }
  .card[data-color="green"]::before  { background: linear-gradient(90deg, #00b894, #55efc4); }
  .card[data-color="orange"]::before { background: linear-gradient(90deg, #e17055, #fdcb6e); }
  .card[data-color="pink"]::before   { background: linear-gradient(90deg, #e84393, #fd79a8); }
  .card[data-color="teal"]::before   { background: linear-gradient(90deg, #00cec9, #81ecec); }
  .card[data-color="red"]::before    { background: linear-gradient(90deg, #d63031, #ff7675); }
  .card[data-color="yellow"]::before { background: linear-gradient(90deg, #fdcb6e, #ffeaa7); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .card-icon {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card-icon.purple  { background: rgba(108,92,231,.15); }
  .card-icon.blue    { background: rgba(52,152,219,.15); }
  .card-icon.green   { background: rgba(0,184,148,.15); }
  .card-icon.orange  { background: rgba(225,112,85,.15); }
  .card-icon.pink    { background: rgba(232,67,147,.15); }
  .card-icon.teal    { background: rgba(0,206,201,.15); }
  .card-icon.red     { background: rgba(214,48,49,.15); }
  .card-icon.yellow  { background: rgba(243,156,18,.15); }

  .card-info { flex: 1; min-width: 0; }
  .card-info .name {
    font-weight: 600; font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-info .url {
    font-size: .75rem; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .card-body { margin-bottom: 10px; }
  .field {
    display: flex; align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--divider);
  }
  .field:last-child { border-bottom: none; }
  .field-label {
    width: 52px; font-size: .75rem; color: var(--text-secondary);
    flex-shrink: 0;
  }
  .field-value {
    flex: 1; min-width: 0;
    font-size: .85rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  .field-value.pw { letter-spacing: 1.5px; cursor: pointer; }
  .field-value.pw.revealed { letter-spacing: 0; }
  .field-action {
    flex-shrink: 0;
    margin-left: 8px;
  }
  .field-action .btn-icon { width: 26px; height: 26px; }

  .card-footer {
    display: flex; justify-content: flex-end; gap: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--divider);
  }
  .card-footer .btn-icon { width: 28px; height: 28px; font-size: .8rem; }

  /* ===== Modal ===== */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%; max-width: 480px;
    padding: 28px 32px;
    box-shadow: var(--shadow);
    animation: modalIn .2s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: none; } }
  .modal h2 {
    font-size: 1.15rem; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: .8rem; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 5px;
  }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--input-bg);
    color: var(--text);
    font-size: .9rem;
    outline: none;
    transition: border .2s;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .form-group .pw-row {
    display: flex; gap: 8px;
  }
  .form-group .pw-row input { flex: 1; }
  .form-group .pw-row .btn-icon { align-self: stretch; width: 40px; }
  .modal-actions {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 200;
  }
  .toast {
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    font-size: .85rem;
    display: flex; align-items: center; gap: 10px;
    animation: toastIn .25s ease;
  }
  .toast.success { border-color: var(--green); }
  .toast.success svg { color: var(--green); }
  .toast.error { border-color: var(--red); }
  .toast.error svg { color: var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    header { padding: 16px 16px 0; }
    .toolbar { padding: 12px 16px; }
    .vault { padding: 0 16px 24px; }
    .grid { grid-template-columns: 1fr; }
    .login-box { margin: 16px; padding: 28px 24px; }
  }
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="loginScreen">
  <div class="login-box" style="position:relative">
    <button class="theme-btn-login" onclick="toggleTheme()" title="鍒囨崲涓婚" id="loginThemeBtn">馃寵</button>
    <div class="logo-big">馃攼</div>
    <h1>瀵嗙爜<span>淇濋櫓绠?/span></h1>
    <p class="sub" id="loginSubText">璇疯緭鍏ヤ富瀵嗙爜瑙ｉ攣</p>
    <div class="form-group">
      <label id="loginLabel">涓诲瘑鐮?/label>
      <input type="password" id="loginPw" placeholder="璇疯緭鍏ヤ富瀵嗙爜" autocomplete="off" onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="form-group" id="confirmGroup" style="display:none">
      <label>纭涓诲瘑鐮?/label>
      <input type="password" id="loginPwConfirm" placeholder="鍐嶆杈撳叆涓诲瘑鐮? autocomplete="off" onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">瑙ｉ攣</button>
    <div class="login-error" id="loginError"></div>
    <div class="setup-hint" id="setupHint" style="display:none">
      馃挕 棣栨浣跨敤锛岃璁剧疆涓€涓富瀵嗙爜銆傚瘑鐮佹暟鎹皢鐢ㄦ瀵嗙爜鍔犲瘑瀛樺偍鍦ㄦ祻瑙堝櫒涓€?br>
      <strong>璇风墷璁版瀵嗙爜锛屽繕璁板悗鏃犳硶鎭㈠锛?/strong>
    </div>
    <div class="setup-hint" id="loginHint" style="display:none">
      鈩癸笍 杈撳叆浣犻娆¤缃殑涓诲瘑鐮佸嵆鍙В閿佸瘑鐮佷繚闄╃銆?    </div>
  </div>
</div>

<!-- ===== Main App ===== -->
<div id="app" style="display:none;flex-direction:column;min-height:100vh">
<header>
  <div class="logo">
    <div class="logo-icon">馃攼</div>
    <h1>瀵嗙爜<span>淇濋櫓绠?/span></h1>
  </div>
  <div class="header-actions">
    <div class="header-stats">
      <span>鎬昏 <strong id="totalCount">0</strong> 鏉?/span>
      <span>鍒嗙被 <strong id="categoryCount">0</strong> 绫?/span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="鍒囨崲娣辫壊/娴呰壊涓婚">
      <span class="knob">馃寵</span>
    </button>
    <button class="btn-logout" onclick="logout()" title="閿佸畾淇濋櫓绠?>馃敀 閿佸畾</button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
    <input type="text" id="search" placeholder="鎼滅储鏈嶅姟鍚嶇О鎴栫敤鎴峰悕鈥? oninput="render()">
  </div>
  <button class="btn btn-primary" onclick="openAddModal()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    鏂板
  </button>
</div>

<div class="vault">
  <div class="grid" id="grid"></div>
</div>

<!-- ===== Add / Edit Modal ===== -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">馃摑 鏂板瀵嗙爜</h2>
    <div class="form-group">
      <label>鏈嶅姟鍚嶇О</label>
      <input type="text" id="fName" placeholder="渚嬪: GitHub">

// ===== Utility =====
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;

// Simple SHA-256 hash
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Simple XOR-based encrypt/decrypt using master password
function encryptData(data, key) {
  const json = JSON.stringify(data);
  let keyStr = '';
  for (let i = 0; i < json.length; i++) {
    const kc = key.charCodeAt(i % key.length);
    keyStr += String.fromCharCode(json.charCodeAt(i) ^ kc);
  }
  return btoa(unescape(encodeURIComponent(keyStr)));
}

function decryptData(encoded, key) {
  try {
    const keyStr = decodeURIComponent(escape(atob(encoded)));
    let json = '';
    for (let i = 0; i < keyStr.length; i++) {
      const kc = key.charCodeAt(i % key.length);
      json += String.fromCharCode(keyStr.charCodeAt(i) ^ kc);
    }
    return JSON.parse(json);
  } catch { return null; }
}

// ===== Login =====
let masterKey = '';

function getStoredHash() {
  return localStorage.getItem('pw_master_hash');
}

function isLoggedIn() {
  return sessionStorage.getItem('pw_logged_in') === 'true';
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPw').value = '';
  document.getElementById('loginPwConfirm').value = '';
  document.getElementById('loginError').textContent = '';
  masterKey = '';
  sessionStorage.removeItem('pw_logged_in');
}

function handleLogin() {
  const pw = document.getElementById('loginPw').value;
  const error = document.getElementById('loginError');
  const hash = getStoredHash();

  if (!hash) {
    // First time setup
    const confirm = document.getElementById('loginPwConfirm').value;
    if (!confirm) {
      // First click - show confirm field
      document.getElementById('confirmGroup').style.display = 'block';
      document.getElementById('loginPwConfirm').focus();
      document.getElementById('loginBtn').textContent = '璁剧疆涓诲瘑鐮?;
      document.getElementById('loginSubText').textContent = '棣栨浣跨敤锛岃璁剧疆涓诲瘑鐮?;
      return;
    }
    if (pw.length < 4) {
      error.textContent = '涓诲瘑鐮佽嚦灏?4 涓瓧绗?;
      return;
    }
    if (pw !== confirm) {
      error.textContent = '涓ゆ杈撳叆鐨勫瘑鐮佷笉涓€鑷?;
      return;
    }
    // Save hash and proceed
    sha256(pw).then(h => {
      localStorage.setItem('pw_master_hash', h);
      masterKey = pw;
      sessionStorage.setItem('pw_logged_in', 'true');
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';
      init();
    });
    return;
  }

  // Verify password
  sha256(pw).then(h => {
    if (h === hash) {
      masterKey = pw;
      sessionStorage.setItem('pw_logged_in', 'true');
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';
      init();
    } else {
      error.textContent = '鉂?涓诲瘑鐮侀敊璇?;
      document.getElementById('loginPw').value = '';
      document.getElementById('loginPw').focus();
    }
  });
}

  document.getElementById('confirmGroup').style.display = 'none';

  document.getElementById('loginBtn').textContent = '瑙ｉ攣';

}

// ===== Toast =====
function toast(msg, type) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(20px)'; el.style.transition = 'all .3s'; setTimeout(() => el.remove(), 300); }, 2500);
}
